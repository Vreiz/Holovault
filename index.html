<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holovault | Portfolio Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.mini.min.js"></script>
    <style>
        :root {
            --bg-main: #090d16; --bg-card: #111827; --primary: #4f46e5; 
            --text-main: #f9fafb; --text-muted: #9ca3af; --border: #1f2937; 
            --green: #10b981; --danger: #ef4444; --sold: #d97706;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; padding: 1.5rem; -webkit-font-smoothing: antialiased; }
        .container { max-width: 1340px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        header h1 { margin: 0; font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }

        .dashboard-layout { display: grid; grid-template-columns: 440px 1fr; gap: 2rem; align-items: start; }
        .flat-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.2rem; }
        .panel-title { font-size: 1rem; font-weight: 600; margin: 0 0 1rem 0; color: var(--text-main); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 0.8rem; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.3rem; }
        
        input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 0.6rem; background: var(--bg-main); border: 1px solid var(--border); border-radius: 6px; color: var(--text-main); font-size: 0.85rem; box-sizing: border-box; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }
        textarea { resize: none; min-height: 50px; }

        input[type="date"] { color-scheme: dark; cursor: pointer; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; filter: invert(0.8); }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .checkbox-row { display: flex; gap: 1.5rem; background: var(--bg-main); padding: 0.7rem; border-radius: 6px; border: 1px solid var(--border); grid-column: 1 / -1; }
        .checkbox-label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; color: var(--text-muted); }

        button.btn-submit { width: 100%; padding: 0.7rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.15s; margin-top:0.5rem;}
        button.btn-submit:hover { background: #4338ca; }
        button.btn-cancel { width: 100%; padding: 0.7rem; background: #374151; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 0.4rem; } 
        button.btn-cancel:hover { background: #4b5563; }

        .search-row { display: flex; gap: 0.4rem; margin-bottom: 0.8rem; }
        #hasilPencarian { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; max-height: 190px; overflow-y: auto; padding-right: 2px; }
        .card-preview { width: 100%; aspect-ratio: 2.5/3.5; object-fit: cover; cursor: pointer; border-radius: 4px; opacity: 0.5; border: 1px solid transparent; }
        .card-preview:hover, .card-preview.selected { opacity: 1; border-color: var(--primary); }

        .tab-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .tabs { display: flex; gap: 1.2rem; margin-bottom: -1px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 0.95rem; font-weight: 600; padding: 0.5rem 0; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--text-main); border-bottom-color: var(--text-main); }
        
        .btn-bulk-mode { background: #1f2937; border: 1px solid var(--border); color: white; padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.8rem; font-weight: 600; cursor:pointer;}

        #bulkActionBar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111827; border: 1px solid var(--primary); padding: 0.8rem 1.5rem; border-radius: 30px; z-index: 100; display: flex; gap: 1rem; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .bulk-action-wrapper { position: absolute; top: 6px; left: 6px; z-index: 20; display:flex; gap:4px; align-items:center; background: rgba(0,0,0,0.85); padding:4px 6px; border-radius:4px; }
        .bulk-checkbox { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
        .bulk-qty-input { width: 35px; padding: 2px; font-size: 0.75rem; border-radius:3px; background:#090d16; color:white; border:1px solid var(--border); text-align: center; }

        .qty-adjuster { display:flex; align-items:center; background:#1f2937; border-radius:12px; overflow:hidden; border:1px solid var(--border); }
        .qty-btn { background:transparent; border:none; color:white; padding: 2px 8px; font-weight:bold; cursor:pointer; }
        .qty-btn:hover { background:var(--primary); }
        .qty-val { font-size: 0.75rem; font-weight:bold; padding: 0 4px; min-width: 14px; text-align:center;}

        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.2rem; }
        .showcase-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .card-header { display: flex; background: rgba(0,0,0,0.15); padding: 0.6rem; border-bottom: 1px solid var(--border); gap: 0.8rem; }
        .card-thumb { width: 55px; height: 77px; object-fit: cover; border-radius: 3px; border: 1px solid var(--border); }
        .card-title-area { flex: 1; overflow: hidden; }
        .card-title { font-size: 0.9rem; font-weight: 600; margin: 0 0 0.1rem 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display:flex; justify-content:space-between; align-items:center;}
        .card-set { font-size: 0.7rem; color: var(--text-muted); margin: 0 0 0.3rem 0; }
        .finance-row { display: flex; justify-content: space-between; font-size: 0.75rem; }

        .card-body { padding: 0.6rem; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; gap: 0.4rem; }
        .meta-tags { display: flex; flex-wrap: wrap; gap: 0.25rem; font-size: 0.65rem; }
        .tag { padding: 0.15rem 0.35rem; border-radius: 3px; font-weight: 600; background: #1f2937; color: var(--text-muted); }
        .card-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.25rem; margin-top: 0.3rem; }
        .btn-action { padding: 0.35rem; font-size: 0.7rem; font-weight: 600; border-radius: 4px; border: none; cursor: pointer; color: white; }
        
        #soldGrid { display: flex; flex-direction: column; gap: 1rem; }
        .trx-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
        .trx-mini-item { display:flex; gap:12px; align-items:center; background: var(--bg-main); padding:8px; border-radius:6px; margin-bottom:6px; border:1px solid var(--border); }
        .btn-undo-sale { background: transparent; border: 1px solid var(--danger); color: var(--danger); font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; font-weight: bold; width: auto; cursor:pointer;}
        .btn-undo-sale:hover { background:var(--danger); color:white; }
        
        #toastContainer { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events:none; }
        .toast { background: #1f2937; border-left: 4px solid var(--primary); padding: 12px 20px; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); color: white; font-size: 0.85rem; font-weight: 600; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-box { background: var(--bg-card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 8px; width: 320px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .modal-title { font-size: 1.1rem; font-weight:bold; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }

        .profit-plus { color: var(--green); } .profit-minus { color: var(--danger); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="toastContainer"></div>

<div id="customModal" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="modal-title" id="modalTitle">Konfirmasi</div>
        <div id="modalBody" style="margin-bottom: 1rem; font-size:0.85rem; color:var(--text-muted);"></div>
        <div id="modalInputs" style="display:flex; flex-direction:column; gap:0.5rem; margin-bottom:1rem;"></div>
        <div style="display:flex; gap:0.5rem;">
            <button onclick="closeModal()" style="background:#374151; padding:0.6rem; border-radius:6px; color:white; border:none; flex:1; cursor:pointer;">Batal</button>
            <button id="modalConfirmBtn" style="background:var(--primary); padding:0.6rem; border-radius:6px; color:white; border:none; flex:1; font-weight:bold; cursor:pointer;">Proses</button>
        </div>
    </div>
</div>

<div class="container">
    <header>
        <h1>HOLOVAULT</h1>
        <div style="display: flex; gap: 0.8rem; align-items: center;">
            <input type="file" id="excelFileInput" accept=".xlsx, .xls, .csv" style="display: none;" onchange="handleExcelImport(event)">
            <button type="button" onclick="document.getElementById('excelFileInput').click()" style="background: #1f2937; border: 1px solid var(--border); padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.8rem; width: auto;">📥 Import Excel</button>
            <div style="color: var(--text-muted); font-size: 0.8rem; font-weight: 500;">v6.7 Master Tools</div>
        </div>
    </header>

    <!-- TOMBOL HAPUS BORONGAN DITAMBAHKAN DI SINI -->
    <div id="bulkActionBar" class="hidden">
        <span id="bulkCountText" style="color:white; font-size: 0.85rem; font-weight:bold;">0 Terpilih</span>
        <button onclick="openBulkSellModal()" style="background:var(--green); padding:0.4rem 1rem; border-radius:15px; width:auto; font-size:0.8rem; font-weight:bold;">Jual Borongan</button>
        <button onclick="openBulkDeleteModal()" style="background:var(--danger); padding:0.4rem 1rem; border-radius:15px; width:auto; font-size:0.8rem; font-weight:bold;">Hapus Borongan</button>
        <button onclick="toggleBulkMode()" style="background:transparent; border:1px solid white; padding:0.4rem 1rem; border-radius:15px; width:auto; font-size:0.8rem;">Batal</button>
    </div>

    <div class="dashboard-layout">
        <!-- FORM LEFT -->
        <div class="flat-panel">
            <div class="panel-title" id="formTitle">Vault Entry</div>
            
            <div style="background: var(--bg-main); padding: 0.8rem; border-radius: 6px; margin-bottom: 1rem; border: 1px solid var(--border);">
                <div class="search-row">
                    <input type="text" id="searchInput" placeholder="Nama kartu...">
                    <input type="text" id="searchSet" placeholder="Set..." style="max-width: 100px;">
                    <button type="button" onclick="cariKartu()" id="btnSearch" style="width:auto; padding:0 0.8rem;">Cari</button>
                </div>
                <div id="hasilPencarian"></div>
            </div>

            <form id="formKartu">
                <div class="form-group full" style="margin-bottom: 0.8rem;"><input type="text" id="imageUrl" name="external_image_url" placeholder="Paste link gambar..."></div>
                <div class="form-grid">
                    <div class="form-group full"><label>Nama Item</label><input type="text" id="nama" name="name" required></div>
                    <div class="form-group">
                        <label>Kategori</label>
                        <select name="category" id="categorySelect" onchange="handleCategoryChange()" required>
                            <option value="Single">Single Card</option><option value="Sealed">Sealed Product</option><option value="Slab">Graded Slab</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Bahasa</label>
                        <select name="language" id="languageSelect"><option value="English">English</option><option value="Japanese">Japanese</option><option value="Indonesian">Indonesian</option></select>
                    </div>
                    <div class="form-group full"><label>Set Edisi</label><input type="text" id="set" name="set_name" required></div>
                    <div class="form-group"><label>Kode Set</label><input type="text" id="setCode" name="set_code"></div>
                    <div class="form-group"><label>No Kartu</label><input type="text" id="cardNumber" name="card_number"></div>
                    <div class="form-group"><label>Harga Modal</label><input type="number" step="0.01" id="purchasePrice" name="purchase_price"></div>
                    <div class="form-group"><label>Harga Pasar</label><input type="number" step="0.01" id="marketPrice" name="market_price"></div>

                    <div class="checkbox-row" id="specialAttributes">
                        <label class="checkbox-label"><input type="checkbox" id="isHolo" name="is_holo" value="1"> Foil</label>
                        <label class="checkbox-label"><input type="checkbox" id="isFirstEd" name="is_first_edition" value="1"> 1st Ed</label>
                    </div>
                    <div class="form-group full" id="conditionGroup">
                        <label>Kondisi</label>
                        <select name="card_condition" id="conditionSelect"><option value="NM" selected>Near Mint</option><option value="M">Mint</option><option value="LP">LP</option><option value="MP">MP</option><option value="HP">HP</option><option value="DMG">DMG</option></select>
                    </div>
                </div>

                <div id="gradedFields" class="hidden" style="background: rgba(0,0,0,0.15); padding: 0.8rem; border-radius: 6px; border: 1px dashed var(--border); margin-bottom: 0.8rem;">
                    <div class="form-grid" style="margin-bottom:0;">
                        <div class="form-group"><label>Grader</label><select name="grader" id="graderSelect"><option value="">--</option><option value="PSA">PSA</option><option value="BGS">BGS</option><option value="CGC">CGC</option><option value="ARS">ARS</option></select></div>
                        <div class="form-group"><label>Skor</label><input type="text" id="gradeInput" name="grade"></div>
                        <div class="form-group full" style="margin-bottom:0;"><label>No Sertifikasi</label><input type="text" id="certInput" name="cert_number"></div>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group full"><textarea id="notesInput" name="notes" placeholder="Catatan transaksi..."></textarea></div>
                    <div class="form-group full"><label>Kuantitas</label><input type="number" id="qtyInput" name="quantity" value="1" min="1" required></div>
                </div>

                <button type="submit" class="btn-submit" id="btnSubmit">SIMPAN KE VAULT</button>
                <button type="button" class="btn-cancel hidden" id="btnCancel" onclick="batalEdit()">BATAL EDIT</button>
            </form>
        </div>

        <!-- RIGHT SHOWCASE -->
        <div>
            <div class="tab-header">
                <div class="tabs">
                    <button class="tab-btn active" id="tabVault" onclick="switchTab('vault')">💎 Vault Portfolio</button>
                    <button class="tab-btn" id="tabSold" onclick="switchTab('sold')">💰 Transaksi (Sold)</button>
                </div>
                <button class="btn-bulk-mode" id="btnToggleBulk" onclick="toggleBulkMode()">📦 Mode Borongan</button>
            </div>
            
            <div style="margin-bottom: 1.2rem;">
                <input type="text" id="inventorySearchInput" placeholder="🔍 Cari nama kartu atau set..." oninput="filterInventory()">
            </div>

            <div id="soldFilterSection" class="hidden" style="background: var(--bg-card); border: 1px solid var(--border); padding: 1rem; border-radius: 8px; margin-bottom: 1.2rem;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div>
                        <label style="display:block; font-size:0.75rem; color:var(--text-muted); margin-bottom:0.3rem; font-weight:600;">DARI TANGGAL</label>
                        <input type="date" id="filterStartDate" onchange="filterInventory()" onclick="this.showPicker()" style="width:100%; padding:0.5rem; background:var(--bg-main); border:1px solid var(--border); color:white; border-radius:6px;">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.75rem; color:var(--text-muted); margin-bottom:0.3rem; font-weight:600;">HINGGA TANGGAL</label>
                        <input type="date" id="filterEndDate" onchange="filterInventory()" onclick="this.showPicker()" style="width:100%; padding:0.5rem; background:var(--bg-main); border:1px solid var(--border); color:white; border-radius:6px;">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; border-top: 1px solid var(--border); padding-top: 0.8rem;">
                    <div>
                        <div style="font-size:0.7rem; color:var(--text-muted); font-weight:600;">TOTAL PENJUALAN (OMSET)</div>
                        <div id="summaryTotalSold" style="font-size:1.2rem; font-weight:800; color:var(--text-main); margin-top:0.2rem;">Rp 0</div>
                    </div>
                    <div>
                        <div style="font-size:0.7rem; color:var(--text-muted); font-weight:600;">KEUNTUNGAN BERSIH (NET P/L)</div>
                        <div id="summaryTotalProfit" style="font-size:1.2rem; font-weight:800; color:var(--green); margin-top:0.2rem;">Rp 0</div>
                    </div>
                </div>
            </div>
            
            <div class="inventory-grid" id="vaultGrid"></div>
            <div id="soldGrid" class="hidden"></div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:3000';
    let globalData = []; let editStateId = null; let isBulkMode = false;
    const formatIDR = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num);

    function showToast(msg, isError = false) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--green)';
        toast.innerText = msg; container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
    }

    function openModal(title, bodyText, inputsHtml, confirmCallback) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = bodyText;
        document.getElementById('modalInputs').innerHTML = inputsHtml;
        
        const confirmBtn = document.getElementById('modalConfirmBtn');
        // Bersihkan event listener sebelumnya untuk mencegah klik ganda
        const newBtn = confirmBtn.cloneNode(true);
        confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);
        newBtn.onclick = () => { confirmCallback(); };
        
        document.getElementById('customModal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('customModal').classList.add('hidden'); }

    function handleCategoryChange() {
        const cat = document.getElementById('categorySelect').value;
        document.getElementById('conditionGroup').classList.toggle('hidden', cat === 'Sealed');
        document.getElementById('gradedFields').classList.toggle('hidden', cat !== 'Slab');
        document.getElementById('specialAttributes').classList.toggle('hidden', cat === 'Sealed');
    }

    function switchTab(tab) {
        if(isBulkMode) toggleBulkMode(); 
        document.getElementById('inventorySearchInput').value = ''; 
        document.getElementById('filterStartDate').value = ''; 
        document.getElementById('filterEndDate').value = ''; 
        
        document.getElementById('tabVault').classList.toggle('active', tab === 'vault');
        document.getElementById('tabSold').classList.toggle('active', tab === 'sold');
        document.getElementById('vaultGrid').classList.toggle('hidden', tab !== 'vault');
        document.getElementById('soldGrid').classList.toggle('hidden', tab !== 'sold');
        document.getElementById('btnToggleBulk').classList.toggle('hidden', tab !== 'vault');
        document.getElementById('soldFilterSection').classList.toggle('hidden', tab !== 'sold');
        filterInventory();
    }

    function filterInventory() {
        const query = document.getElementById('inventorySearchInput').value.toLowerCase();
        const startDate = document.getElementById('filterStartDate').value; 
        const endDate = document.getElementById('filterEndDate').value; 

        document.querySelectorAll('#vaultGrid .showcase-card').forEach(card => {
            const txt = card.textContent.toLowerCase();
            card.classList.toggle('hidden', !txt.includes(query));
        });

        let runningTotalSold = 0; let runningTotalProfit = 0;

        document.querySelectorAll('#soldGrid .trx-card').forEach(card => {
            const cardDate = card.getAttribute('data-date'); 
            const cardGross = parseFloat(card.getAttribute('data-gross') || 0);
            const cardProfit = parseFloat(card.getAttribute('data-profit') || 0);

            let dateMatches = true;
            if (startDate && cardDate < startDate) dateMatches = false;
            if (endDate && cardDate > endDate) dateMatches = false;

            let keywordMatches = false;
            card.querySelectorAll('.trx-mini-item').forEach(item => {
                const match = item.textContent.toLowerCase().includes(query);
                item.classList.toggle('hidden', !match);
                if(match) keywordMatches = true;
            });

            const finalShow = dateMatches && (keywordMatches || query === '');
            card.classList.toggle('hidden', !finalShow);

            if (finalShow) { runningTotalSold += cardGross; runningTotalProfit += cardProfit; }
        });

        document.getElementById('summaryTotalSold').innerText = formatIDR(runningTotalSold);
        const profitEl = document.getElementById('summaryTotalProfit');
        profitEl.innerText = (runningTotalProfit >= 0 ? '+' : '') + formatIDR(runningTotalProfit);
        profitEl.className = runningTotalProfit >= 0 ? 'profit-plus' : 'profit-minus';
    }

    async function quickAdjustQty(id, action) {
        if(isBulkMode) return showToast("Matikan mode borongan dulu!", true);
        try {
            const res = await fetch(`${API_URL}/api/inventory/${id}/qty`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action }) });
            if(res.ok) loadInventory(); else showToast((await res.json()).error, true);
        } catch (e) { showToast("Gagal terhubung server.", true); }
    }

    async function loadInventory() {
        try {
            const res = await fetch(`${API_URL}/api/inventory`); globalData = await res.json();
            const vaultGrid = document.getElementById('vaultGrid'); const soldGrid = document.getElementById('soldGrid');
            vaultGrid.innerHTML = ''; soldGrid.innerHTML = '';
            let vaultCount = 0; let soldCount = 0; const groupedSold = {};

            globalData.forEach(item => {
                const imgSrc = item.image_url || 'https://via.placeholder.com/55x77/111827/ffffff?text=No+Img';
                
                if (item.status === 'Vault' || !item.status) {
                    vaultCount++;
                    let badges = `<span class="tag">${item.category}</span><span class="tag">${item.language}</span>`;
                    if(item.is_first_edition) badges += `<span class="tag" style="color:var(--gold)">1st Ed</span>`;
                    if(item.is_holo) badges += `<span class="tag">Holo</span>`;
                    if(item.grader) badges += `<span class="tag tag-grader">${item.grader} ${item.grade || ''}</span>`;

                    const checkboxHtml = `<div class="bulk-action-wrapper hidden"><input type="checkbox" class="bulk-checkbox" value="${item.id}" onchange="updateBulkCount()"><input type="number" id="bulk_qty_${item.id}" value="${item.quantity}" min="1" max="${item.quantity}" class="bulk-qty-input hidden"></div>`;
                    const qtyAdjuster = `<div class="qty-adjuster"><button class="qty-btn" onclick="quickAdjustQty('${item.id}', 'minus')">-</button><span class="qty-val">${item.quantity}</span><button class="qty-btn" onclick="quickAdjustQty('${item.id}', 'add')">+</button></div>`;
                    
                    vaultGrid.innerHTML += `
                        <div class="showcase-card">
                            ${checkboxHtml}
                            <div class="card-header">
                                <img src="${imgSrc}" class="card-thumb" alt="Card">
                                <div class="card-title-area">
                                    <h3 class="card-title" title="${item.name}">${item.name} ${qtyAdjuster}</h3>
                                    <p class="card-set">${item.set_name}</p>
                                    <div class="finance-row"><span style="color:var(--text-muted)">Cost:</span><span>${parseFloat(item.purchase_price) > 0 ? formatIDR(item.purchase_price) : '-'}</span></div>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="meta-tags">${badges}</div>
                                <div class="card-actions">
                                    <button type="button" class="btn-action" style="background:var(--sold);" onclick="openSingleSellModal('${item.id}', '${item.name.replace(/'/g, "\\'")}', ${item.quantity})">Jual</button>
                                    <button type="button" class="btn-action" style="background:#2563eb;" onclick="mulaiEdit('${item.id}')">Edit</button>
                                    <button type="button" class="btn-action" style="background:var(--danger);" onclick="hapusItem('${item.id}')">Del</button>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    soldCount++;
                    const tid = item.transaction_id || item.id; 
                    if(!groupedSold[tid]) groupedSold[tid] = { items: [], total_sold: 0, total_modal: 0, sold_at: item.sold_at };
                    groupedSold[tid].items.push(item);
                    groupedSold[tid].total_sold += parseFloat(item.sold_price || 0) * item.quantity;
                    groupedSold[tid].total_modal += parseFloat(item.purchase_price || 0) * item.quantity;
                }
            });

            for(let tid in groupedSold) {
                const trx = groupedSold[tid]; const profit = trx.total_sold - trx.total_modal; const profitClass = profit >= 0 ? 'profit-plus' : 'profit-minus';
                let tglDisplay = '-';
                if(trx.sold_at) {
                    const d = new Date(trx.sold_at);
                    tglDisplay = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }) + ' ' + d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                }

                let miniCards = trx.items.map(i => `
                    <div class="trx-mini-item">
                        <img src="${i.image_url || 'https://via.placeholder.com/35x50/111827/ffffff?text=No+Img'}" style="width:35px; height:50px; object-fit:cover; border-radius:4px; border:1px solid var(--border);">
                        <div style="flex:1; font-size:0.8rem;">
                            <b>${i.name}</b> <span style="color:var(--text-muted)">x${i.quantity}</span>
                            <div style="font-size:0.7rem; color:var(--text-muted)">Cost: ${formatIDR(i.purchase_price)} • Sold: ${formatIDR(i.sold_price)}</div>
                        </div>
                        <button onclick="batalJual('${i.id}')" class="btn-undo-sale">↩ Cancel</button>
                    </div>
                `).join('');

                let rawDateStr = trx.sold_at ? trx.sold_at.substring(0, 10) : '';
                soldGrid.innerHTML += `
                    <div class="trx-card" data-date="${rawDateStr}" data-gross="${trx.total_sold}" data-profit="${profit}">
                        <div style="display:flex; justify-content:space-between; margin-bottom: 0.8rem; border-bottom: 1px solid var(--border); padding-bottom: 0.6rem; font-size:0.8rem;">
                            <div><div style="color:var(--text-muted); font-size:0.7rem;">STRUK ${tid.substring(0,8).toUpperCase()} • ${tglDisplay}</div><div>Gross: <b>${formatIDR(trx.total_sold)}</b></div></div>
                            <div style="text-align:right;"><div style="color:var(--text-muted); font-size:0.7rem;">P/L</div><div class="${profitClass}" style="font-weight:700;">${profit >= 0 ? '+' : ''}${formatIDR(profit)}</div></div>
                        </div>
                        <div>${miniCards}</div>
                    </div>
                `;
            }

            if(vaultCount === 0) vaultGrid.innerHTML = `<div style="text-align:center; padding: 2rem; color: var(--text-muted); font-size:0.85rem;">Vault kosong.</div>`;
            if(soldCount === 0) soldGrid.innerHTML = `<div style="text-align:center; padding: 2rem; color: var(--text-muted); font-size:0.85rem;">Belum ada penjualan.</div>`;
            filterInventory();
        } catch (error) { console.error(error); }
    }

    function openSingleSellModal(id, namaItem, maxQty) {
        if(isBulkMode) return showToast("Matikan mode borongan dulu!", true);
        
        let inputsHtml = '';
        if(maxQty > 1) {
            inputsHtml += `
                <label style="font-size:0.75rem; display:block; margin-bottom:0.4rem;">Jumlah Terjual (Bisa diketik, Maks: ${maxQty})</label>
                <div class="qty-adjuster" style="margin-bottom: 0.8rem; display:flex; justify-content: space-between; padding: 0.2rem 0.5rem; background: var(--bg-main);">
                    <button type="button" class="qty-btn" style="font-size:1.2rem;" onclick="let el=document.getElementById('modalSellQtyVal'); let v=parseInt(el.value)||0; if(v > 1) el.value = v - 1;">-</button>
                    <input type="number" id="modalSellQtyVal" value="${maxQty}" min="1" max="${maxQty}" style="width: 60px; text-align: center; border: none; background: transparent; color: white; font-size: 1.1rem; font-weight: bold; padding: 0;">
                    <button type="button" class="qty-btn" style="font-size:1.2rem;" onclick="let el=document.getElementById('modalSellQtyVal'); let v=parseInt(el.value)||0; if(v < ${maxQty}) el.value = v + 1;">+</button>
                </div>
            `;
        } else { inputsHtml += `<input type="hidden" id="modalSellQtyVal" value="1">`; }
        inputsHtml += `<label style="font-size:0.75rem;">Total Harga Jual Keseluruhan (Rp)</label><input type="number" id="modalSellPrice" placeholder="Misal: 150000">`;

        openModal(`Jual ${namaItem}`, `Atur kuantitas dan harga jual untuk transaksi ini.`, inputsHtml, async () => {
            const sellQty = parseInt(document.getElementById('modalSellQtyVal').value); const harga = parseFloat(document.getElementById('modalSellPrice').value);
            if(isNaN(sellQty) || sellQty < 1 || sellQty > maxQty) return showToast(`Kuantitas harus 1 - ${maxQty}!`, true);
            if(isNaN(harga)) return showToast('Harga belum diisi!', true);
            try {
                const res = await fetch(`${API_URL}/api/inventory/${id}/sell`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sell_qty: sellQty, sold_price: harga }) });
                if(res.ok) { closeModal(); showToast("Berhasil dijual!"); loadInventory(); switchTab('sold'); }
            } catch (e) { showToast('Gagal memproses.', true); }
        });
    }

    function openBulkSellModal() {
        const checkboxes = document.querySelectorAll('.bulk-checkbox:checked'); if(checkboxes.length === 0) return showToast('Pilih minimal 1 item!', true);
        const inputsHtml = `<label style="font-size:0.75rem;">Total Harga Borongan Paket (Rp)</label><input type="number" id="modalBulkPrice" placeholder="Membagi rata harga otomatis">`;
        openModal(`Jual Borongan (${checkboxes.length} Tipe)`, `Sistem otomatis membagi rata keuntungan ke tiap kartu.`, inputsHtml, async () => {
            const harga = parseFloat(document.getElementById('modalBulkPrice').value); if(isNaN(harga)) return showToast('Harga kosong!', true);
            const items = Array.from(checkboxes).map(cb => ({ id: cb.value, sell_qty: document.getElementById(`bulk_qty_${cb.value}`).value }));
            try {
                const res = await fetch(`${API_URL}/api/inventory/bulk-sell`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ items, total_price: harga }) });
                if(res.ok) { closeModal(); showToast("Borongan sukses!"); loadInventory(); switchTab('sold'); }
            } catch(e) { showToast('Gagal.', true); }
        });
    }

    // --- FITUR BARU: MODAL HAPUS BORONGAN ---
    function openBulkDeleteModal() {
        const checkboxes = document.querySelectorAll('.bulk-checkbox:checked'); 
        if(checkboxes.length === 0) return showToast('Pilih minimal 1 item untuk dihapus!', true);
        
        openModal(`Hapus Borongan (${checkboxes.length} Tipe)`, `Apakah kamu yakin ingin menghapus permanen ${checkboxes.length} kartu ini dari Vault? Data tidak akan bisa dikembalikan.`, '', async () => {
            const ids = Array.from(checkboxes).map(cb => cb.value);
            try {
                const res = await fetch(`${API_URL}/api/inventory/bulk-delete`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids })
                });
                if(res.ok) {
                    closeModal(); showToast(`${checkboxes.length} item berhasil dihapus!`);
                    loadInventory(); toggleBulkMode(); 
                } else { throw new Error(); }
            } catch(e) { showToast('Gagal menghapus.', true); }
        });
    }

    // --- PENGHAPUSAN WINDOWS ALERT/CONFIRM ---
    function batalJual(id) {
        openModal('Batalkan Penjualan', 'Tarik kartu ini kembali ke Vault dan gabungkan kuantitasnya?', '', async () => {
            try { 
                await fetch(`${API_URL}/api/inventory/${id}/undo-sell`, { method: 'PUT' }); 
                closeModal(); showToast("Dikembalikan ke Vault."); loadInventory(); 
            } catch(e) { showToast('Error.', true); }
        });
    }

    function hapusItem(id) {
        openModal('Hapus Permanen', 'Yakin ingin menghapus kartu ini dari database?', '', async () => {
            try { 
                await fetch(`${API_URL}/api/inventory/${id}`, { method: 'DELETE' }); 
                closeModal(); showToast("Terhapus."); loadInventory(); 
            } catch(e) { showToast('Error.', true); }
        });
    }

    function toggleBulkMode() {
        isBulkMode = !isBulkMode; const wrappers = document.querySelectorAll('.bulk-action-wrapper');
        document.getElementById('bulkActionBar').classList.toggle('hidden', !isBulkMode);
        document.getElementById('btnToggleBulk').innerText = isBulkMode ? 'Batal' : '📦 Mode Borongan';
        document.getElementById('btnToggleBulk').style.background = isBulkMode ? 'var(--danger)' : '#1f2937';
        wrappers.forEach(w => { w.classList.toggle('hidden', !isBulkMode); w.querySelector('.bulk-checkbox').checked = false; }); updateBulkCount();
    }
    function updateBulkCount() { document.getElementById('bulkCountText').innerText = `${document.querySelectorAll('.bulk-checkbox:checked').length} Tipe Dipilih`; }

    function handleExcelImport(event) {
        const file = event.target.files[0]; if (!file) return; const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data, { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                if (jsonData.length === 0) return showToast('File kosong!', true);
                const res = await fetch(`${API_URL}/api/inventory/bulk-import`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(jsonData) });
                if (res.ok) { showToast(`Sukses import ${jsonData.length} item!`); loadInventory(); } else { showToast('Gagal.', true); }
            } catch (err) { showToast('Error.', true); }
        }; reader.readAsArrayBuffer(file);
    }

    async function cariKartu() {
        const qN = document.getElementById('searchInput').value; const qS = document.getElementById('searchSet').value;
        const btn = document.getElementById('btnSearch'); const hasilDiv = document.getElementById('hasilPencarian');
        if (!qN.trim() && !qS.trim()) return showToast("Isi parameter cari!", true);
        btn.innerText = '...'; hasilDiv.innerHTML = '<i>Searching...</i>';
        try {
            const res = await fetch(`${API_URL}/api/search-card?name=${encodeURIComponent(qN)}&set=${encodeURIComponent(qS)}`);
            const cards = await res.json(); hasilDiv.innerHTML = '';
            if (cards.length === 0) return hasilDiv.innerHTML = '<p style="color:var(--danger); font-size:0.8rem;">Card Not Found.</p>';
            
            cards.forEach(card => {
                const img = document.createElement('img'); img.src = card.images.small; img.className = 'card-preview';
                img.onclick = () => {
                    document.querySelectorAll('.card-preview').forEach(el => el.classList.remove('selected')); img.classList.add('selected');
                    document.getElementById('nama').value = card.name; 
                    document.getElementById('set').value = card.set.name;
                    document.getElementById('imageUrl').value = card.images.small; 
                    document.getElementById('cardNumber').value = card.number || '';
                    
                    const customSetMapping = {
                        'sv3pt5': 'MEW', 'sv4pt5': 'PAF', 'swsh12pt5': 'CRZ', 
                        'swsh4pt5': 'SHF', 'swsh7pt5': 'CEL', 'pgo': 'PGO',
                    };
                    document.getElementById('setCode').value = (customSetMapping[card.set.id] || card.set.ptcgoCode || card.set.id || '').toUpperCase();
                }; 
                hasilDiv.appendChild(img);
            });
        } catch (error) { hasilDiv.innerHTML = '<p style="color:var(--danger); font-size:0.8rem;">Offline.</p>'; } finally { btn.innerText = 'Cari'; }
    }

    function mulaiEdit(id) {
        const item = globalData.find(x => x.id === id); if(!item) return;
        editStateId = id; document.getElementById('formTitle').innerText = 'Edit Entry';
        ['nama', 'set', 'setCode', 'cardNumber', 'purchasePrice', 'marketPrice', 'qtyInput', 'notesInput', 'gradeInput', 'certInput', 'imageUrl'].forEach(key => {
            const mapKey = { 'nama':'name', 'set':'set_name', 'setCode':'set_code', 'cardNumber':'card_number', 'purchasePrice':'purchase_price', 'marketPrice':'market_price', 'qtyInput':'quantity', 'notesInput':'notes', 'gradeInput':'grade', 'certInput':'cert_number', 'imageUrl':'image_url' }[key];
            document.getElementById(key).value = item[mapKey] || '';
        });
        ['categorySelect', 'languageSelect', 'conditionSelect', 'graderSelect'].forEach(key => {
            const mapKey = { 'categorySelect':'category', 'languageSelect':'language', 'conditionSelect':'card_condition', 'graderSelect':'grader' }[key];
            document.getElementById(key).value = item[mapKey] || '';
        });
        document.getElementById('isHolo').checked = item.is_holo === 1; document.getElementById('isFirstEd').checked = item.is_first_edition === 1;
        handleCategoryChange(); document.getElementById('btnSubmit').innerText = 'UPDATE ENTRY'; document.getElementById('btnCancel').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function batalEdit() {
        editStateId = null; document.getElementById('formKartu').reset(); document.getElementById('formTitle').innerText = 'Vault Entry';
        document.getElementById('btnSubmit').innerText = 'SIMPAN KE VAULT'; document.getElementById('btnCancel').classList.add('hidden'); handleCategoryChange();
    }

    document.getElementById('formKartu').addEventListener('submit', async (e) => {
        e.preventDefault(); const formData = new FormData(e.target);
        const url = editStateId ? `${API_URL}/api/inventory/${editStateId}` : `${API_URL}/api/inventory`;
        try {
            const res = await fetch(url, { method: editStateId ? 'PUT' : 'POST', body: formData });
            if(res.ok) { batalEdit(); loadInventory(); showToast(editStateId ? "Teredit!" : "Tersimpan!"); }
        } catch (error) { showToast('Error DB.', true); }
    });

    handleCategoryChange(); loadInventory();
</script>
</body>
</html>
