<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holovault | Portfolio Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.mini.min.js"></script>
    <style>
        :root {
            --bg-main: #090d16; --bg-card: #111827; --primary: #4f46e5; 
            --text-main: #ffffff; --text-muted: #cbd5e1; --border: #334155; 
            --green: #10b981; --danger: #ef4444; --sold: #f59e0b;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; padding: 1.5rem; -webkit-font-smoothing: antialiased; line-height: 1.5; }
        .container { max-width: 1340px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        header h1 { margin: 0; font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; color: #ffffff; }

        .dashboard-layout { display: grid; grid-template-columns: 440px 1fr; gap: 2rem; align-items: start; }
        .flat-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.2rem; }
        .panel-title { font-size: 1.1rem; font-weight: bold; margin: 0 0 1rem 0; color: #ffffff; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 0.8rem; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #ffffff; margin-bottom: 0.3rem; }
        
        input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 0.6rem; background: var(--bg-main); border: 1px solid var(--border); border-radius: 6px; color: #ffffff; font-size: 0.9rem; box-sizing: border-box; font-weight: 500;}
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.3); }
        textarea { resize: none; min-height: 50px; }

        ::-webkit-input-placeholder { color: #94a3b8; font-weight: normal; }
        ::-moz-placeholder { color: #94a3b8; font-weight: normal; }

        input[type="date"] { color-scheme: dark; cursor: pointer; color: #ffffff; font-weight: 600; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; filter: invert(1); }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .checkbox-row { display: flex; gap: 1.5rem; background: var(--bg-main); padding: 0.7rem; border-radius: 6px; border: 1px solid var(--border); grid-column: 1 / -1; }
        .checkbox-label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; font-weight: 600; cursor: pointer; color: #ffffff; }

        button.btn-submit { width: 100%; padding: 0.8rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 0.9rem; cursor: pointer; transition: 0.15s; margin-top:0.5rem;}
        button.btn-submit:hover { background: #4338ca; }
        button.btn-cancel { width: 100%; padding: 0.8rem; background: #475569; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 0.9rem; cursor: pointer; margin-top: 0.4rem; } 
        button.btn-cancel:hover { background: #64748b; }

        .search-row { display: flex; gap: 0.4rem; margin-bottom: 0.8rem; }
        #hasilPencarian { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; max-height: 190px; overflow-y: auto; padding-right: 2px; }
        .card-preview { width: 100%; aspect-ratio: 2.5/3.5; object-fit: cover; cursor: pointer; border-radius: 4px; opacity: 0.5; border: 2px solid transparent; }
        .card-preview:hover, .card-preview.selected { opacity: 1; border-color: var(--primary); }

        .tab-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;}
        .tabs { display: flex; gap: 1.2rem; margin-bottom: -1px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 1rem; font-weight: bold; padding: 0.5rem 0; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #ffffff; border-bottom-color: #ffffff; }
        
        .btn-bulk-mode { background: #1f2937; border: 1px solid var(--border); color: white; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem; font-weight: bold; cursor:pointer;}

        #bulkActionBar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 2px solid var(--primary); padding: 0.8rem 1.5rem; border-radius: 30px; z-index: 100; display: flex; gap: 1rem; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.8); }

        .qty-adjuster { display:flex; align-items:center; background:#1f2937; border-radius:12px; overflow:hidden; border:1px solid var(--border); flex-shrink: 0; }
        .qty-btn { background:transparent; border:none; color:#ffffff; padding: 2px 8px; font-weight:bold; font-size:1rem; cursor:pointer; }
        .qty-btn:hover { background:var(--primary); }
        .qty-val { font-size: 0.85rem; font-weight:bold; padding: 0 6px; min-width: 14px; text-align:center; color:#ffffff;}

        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.2rem; }
        .showcase-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; position: relative; transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s; }
        .card-header { display: flex; background: rgba(0,0,0,0.25); padding: 0.8rem; border-bottom: 1px solid var(--border); gap: 0.8rem; }
        .card-thumb { width: 60px; height: 84px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); }
        .card-title-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
        .card-title { font-size: 0.95rem; font-weight: bold; margin: 0 0 0.2rem 0; display:flex; justify-content:space-between; align-items:center; color:#ffffff; gap: 0.5rem; width: 100%; box-sizing: border-box; }
        .card-name-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; color: #ffffff; }

        .card-set { font-size: 0.75rem; color: var(--text-muted); margin: 0 0 0.4rem 0; font-weight: 500;}
        .finance-row { 
            display: flex; 
            justify-content: space-between; 
            flex-wrap: wrap; /* Ini kunci utamanya agar teks bisa turun ke bawah */
            gap: 0.3rem; /* Memberi jarak pernapasan jika teks terpaksa turun */
            font-size: 0.75rem; 
            font-weight: 600; 
            color: #ffffff;
        }

        .card-body { padding: 0.8rem; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; gap: 0.6rem; }
        .meta-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; font-size: 0.7rem; }
        .tag { padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: bold; background: #334155; color: #ffffff; }
        .card-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.4rem; margin-top: 0.4rem; transition: opacity 0.2s; }
        .btn-action { padding: 0.4rem; font-size: 0.75rem; font-weight: bold; border-radius: 4px; border: none; cursor: pointer; color: white; }
        
        .showcase-card.is-bulkable { cursor: pointer; }
        .showcase-card.is-bulkable:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .showcase-card.is-bulkable .card-actions, .showcase-card.is-bulkable .qty-adjuster { pointer-events: none; opacity: 0.3; filter: grayscale(1); }
        
        .bulk-overlay-ui { position: absolute; inset: 0; background: rgba(16, 185, 129, 0.2); backdrop-filter: blur(2px); z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 3px solid var(--green); border-radius: 6px; }
        .check-circle { background: var(--green); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 10px; }
        .bulk-qty-override { width: 80px; padding: 8px; font-size: 1.2rem; border-radius: 6px; background: #090d16; color: white; border: 2px solid var(--green); text-align: center; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        #soldGrid { display: flex; flex-direction: column; gap: 1rem; }
        .trx-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.2rem; }
        .trx-mini-item { display:flex; gap:12px; align-items:center; background: var(--bg-main); padding:10px; border-radius:6px; margin-bottom:8px; border:1px solid var(--border); }
        .btn-undo-sale { background: transparent; border: 1px solid var(--danger); color: var(--danger); font-size: 0.75rem; padding: 6px 12px; border-radius: 4px; font-weight: bold; width: auto; cursor:pointer;}
        .btn-undo-sale:hover { background:var(--danger); color:white; }
        
        #toastContainer { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events:none; }
        .toast { background: #1e293b; border-left: 5px solid var(--primary); padding: 15px 25px; border-radius: 6px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); color: white; font-size: 0.9rem; font-weight: bold; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-box { background: var(--bg-card); border: 1px solid var(--border); padding: 1.8rem; border-radius: 12px; width: 340px; box-shadow: 0 25px 50px rgba(0,0,0,0.8); }
        .modal-title { font-size: 1.2rem; font-weight:bold; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.8rem; color:#ffffff;}

        .profit-plus { color: var(--green); } .profit-minus { color: var(--danger); }
        .hidden { display: none !important; }
        
        .btn-show-more { background:#1e293b; color:white; border:2px solid var(--primary); padding:0.8rem 2rem; border-radius:30px; font-weight:bold; cursor:pointer; font-size: 0.95rem; transition: 0.2s; }
        .btn-show-more:hover { background:var(--primary); }
        .btn-show-all { background:var(--primary); color:white; border:none; padding:0.8rem 2rem; border-radius:30px; font-weight:bold; cursor:pointer; font-size: 0.95rem; transition: 0.2s; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); }
        .btn-show-all:hover { background:#4338ca; transform: translateY(-2px); }
    </style>
</head>
<body>

<div id="toastContainer"></div>

<div id="customModal" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="modal-title" id="modalTitle">Konfirmasi</div>
        <div id="modalBody" style="margin-bottom: 1.2rem; font-size:0.9rem; color:#ffffff; line-height: 1.5;"></div>
        <div id="modalInputs" style="display:flex; flex-direction:column; gap:0.8rem; margin-bottom:1.2rem;"></div>
        <div style="display:flex; gap:0.8rem;">
            <button onclick="closeModal()" style="background:#475569; padding:0.8rem; border-radius:6px; color:white; border:none; flex:1; font-weight:bold; cursor:pointer;">Batal</button>
            <button id="modalConfirmBtn" style="background:var(--primary); padding:0.8rem; border-radius:6px; color:white; border:none; flex:1; font-weight:bold; cursor:pointer;">Proses</button>
        </div>
    </div>
</div>

<div class="container">
    <header>
        <h1>HOLOVAULT</h1>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
            <input type="file" id="excelFileInput" accept=".xlsx, .xls, .csv" style="display: none;" onchange="handleExcelImport(event)">
            <button type="button" onclick="document.getElementById('excelFileInput').click()" style="background: #334155; border: 1px solid var(--border); padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem; font-weight:bold; color:#ffffff; width: auto; cursor:pointer;">📥 Import Excel</button>
            <button type="button" onclick="exportToExcel()" style="background: #059669; border: 1px solid var(--green); padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem; font-weight:bold; color:#ffffff; width: auto; cursor:pointer;">📤 Export DB</button>
            <div style="color: var(--text-muted); font-size: 0.85rem; font-weight: 600; margin-left:0.5rem;">v9.2 File Upload Support</div>
        </div>
    </header>

    <div id="bulkActionBar" class="hidden">
        <span id="bulkCountText" style="color:white; font-size: 0.95rem; font-weight:bold; margin-right: 0.5rem;">0 Terpilih</span>
        <button onclick="toggleSelectAll()" style="background:#3b82f6; padding:0.5rem 1.2rem; border-radius:20px; color:#ffffff; border:none; cursor:pointer; font-size:0.85rem; font-weight:bold; margin-right: 0.5rem;">Pilih Semua</button>
        <button onclick="openBulkSellModal()" style="background:var(--green); padding:0.5rem 1.2rem; border-radius:20px; color:#ffffff; border:none; cursor:pointer; font-size:0.85rem; font-weight:bold;">Jual Borongan</button>
        <button onclick="openBulkDeleteModal()" style="background:var(--danger); padding:0.5rem 1.2rem; border-radius:20px; color:#ffffff; border:none; cursor:pointer; font-size:0.85rem; font-weight:bold;">Hapus Borongan</button>
        <button onclick="toggleBulkMode()" style="background:transparent; border:2px solid white; padding:0.4rem 1.2rem; border-radius:20px; color:#ffffff; cursor:pointer; font-size:0.85rem; font-weight:bold; margin-left: 0.5rem;">Batal</button>
    </div>

    <div class="dashboard-layout">
        <div class="flat-panel">
            <div class="panel-title" id="formTitle">Vault Entry</div>
            
            <div style="background: var(--bg-main); padding: 1rem; border-radius: 8px; margin-bottom: 1.2rem; border: 1px solid var(--border);">
                <div class="search-row">
                    <input type="text" id="searchInput" placeholder="Nama kartu...">
                    <input type="text" id="searchSet" placeholder="Set..." style="max-width: 100px;">
                    <button type="button" onclick="cariKartu()" id="btnSearch" style="width:auto; padding:0 1rem; background:var(--primary); color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">Cari</button>
                </div>
                <div id="hasilPencarian"></div>
            </div>

            <form id="formKartu">
                
                <div class="form-group full" style="margin-bottom: 1rem; background: rgba(0,0,0,0.25); padding: 0.8rem; border-radius: 8px; border: 1px dashed var(--border);">
                    <label style="margin-bottom: 0.5rem;">Gambar Kartu</label>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <input type="text" id="imageUrl" name="external_image_url" placeholder="Paste link gambar..." style="flex:1;">
                        <span style="font-size:0.75rem; color:var(--text-muted); font-weight:bold;">ATAU</span>
                        <input type="file" id="imageFile" name="image_file" accept="image/*" style="width:200px; padding:0.4rem; background:#1f2937; border-radius:6px; color:white; cursor:pointer;">
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group full"><label>Nama Item</label><input type="text" id="nama" name="name" required></div>
                    <div class="form-group">
                        <label>Kategori</label>
                        <select name="category" id="categorySelect" onchange="handleCategoryChange()" required>
                            <option value="Single">Single Card</option>
                            <option value="Sealed">Sealed Product</option>
                            <option value="Slab">Graded Slab</option>
                            <option value="Slab Set">Sequential Slab Set</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Bahasa</label>
                        <select name="language" id="languageSelect"><option value="English">English</option><option value="Japanese">Japanese</option><option value="Chinese">Chinese</option></select>
                    </div>
                    <div class="form-group full"><label>Set Edisi</label><input type="text" id="set" name="set_name" required></div>
                    <div class="form-group"><label>Kode Set</label><input type="text" id="setCode" name="set_code"></div>
                    <div class="form-group"><label>No Kartu</label><input type="text" id="cardNumber" name="card_number"></div>
                    
                    <div class="form-group"><label>Harga Modal (Rp)</label><input type="text" id="purchasePrice" placeholder="0" oninput="formatRupiah(this)"></div>
                    <div class="form-group"><label>Harga Pasar (Rp)</label><input type="text" id="marketPrice" placeholder="0" oninput="formatRupiah(this)"></div>

                    <div class="checkbox-row" id="specialAttributes">
                        <label class="checkbox-label"><input type="checkbox" id="isHolo" name="is_holo" value="1"> Foil</label>
                        <label class="checkbox-label"><input type="checkbox" id="isFirstEd" name="is_first_edition" value="1"> 1st Ed</label>
                    </div>
                    <div class="form-group full" id="conditionGroup">
                        <label>Kondisi</label>
                        <select name="card_condition" id="conditionSelect"><option value="NM" selected>Near Mint</option><option value="M">Mint</option><option value="LP">LP</option><option value="MP">MP</option><option value="HP">HP</option><option value="DMG">DMG</option></select>
                    </div>
                </div>

                <div id="gradedFields" class="hidden" style="background: rgba(0,0,0,0.25); padding: 1rem; border-radius: 8px; border: 1px dashed var(--border); margin-bottom: 1rem;">
                    <div class="form-grid" style="margin-bottom:0;">
                        <div class="form-group"><label>Grader</label><select name="grader" id="graderSelect"><option value="">--</option><option value="PSA">PSA</option><option value="BGS">BGS</option><option value="CGC">CGC</option><option value="ARS">ARS</option></select></div>
                        <div class="form-group"><label>Skor Total</label><input type="text" id="gradeInput" name="grade"></div>
                        <div class="form-group full" style="margin-bottom:0;"><label>No Sertifikasi</label><input type="text" id="certInput" name="cert_number"></div>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group full"><label>Catatan / Detail Kartu</label><textarea id="notesInput" name="notes" placeholder="Ketik catatan tambahan disini..."></textarea></div>
                    <div class="form-group full"><label>Kuantitas (Set)</label><input type="number" id="qtyInput" name="quantity" value="1" min="1" required></div>
                </div>

                <button type="submit" class="btn-submit" id="btnSubmit">SIMPAN KE VAULT</button>
                <button type="button" class="btn-cancel hidden" id="btnCancel" onclick="batalEdit()">BATAL EDIT</button>
            </form>
        </div>

        <div>
            <div class="tab-header">
                <div class="tabs">
                    <button class="tab-btn active" id="tabVault" onclick="switchTab('vault')">💎 Vault Portfolio</button>
                    <button class="tab-btn" id="tabSold" onclick="switchTab('sold')">💰 Transaksi (Sold)</button>
                </div>
                <button class="btn-bulk-mode" id="btnToggleBulk" onclick="toggleBulkMode()">📦 Mode Borongan</button>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 200px 220px; gap: 1rem; margin-bottom: 1.2rem;">
                <input type="text" id="inventorySearchInput" placeholder="🔍 Cari berdasarkan nama kartu atau kode..." oninput="applyFiltersAndRender()" style="padding:0.8rem; font-size:1rem; border-radius:8px; margin:0;">
                
                <select id="sortSelect" onchange="applyFiltersAndRender()" style="padding:0.8rem; font-size:1rem; border-radius:8px; background: var(--bg-card); color: white; border: 1px solid var(--border); cursor: pointer; font-weight:bold;">
                    <option value="terbaru">🕒 Paling Baru</option>
                    <option value="market_tertinggi">📈 Market Tertinggi</option>
                    <option value="market_terendah">📉 Market Terendah</option>
                </select>

                <select id="filterSetSelect" onchange="applyFiltersAndRender()" style="padding:0.8rem; font-size:1rem; border-radius:8px; background: var(--bg-card); color: white; border: 1px solid var(--border); cursor: pointer; font-weight:bold;">
                    <option value="">✨ Semua Set</option>
                </select>
            </div>

            <div id="soldFilterSection" class="hidden" style="background: var(--bg-card); border: 1px solid var(--border); padding: 1.2rem; border-radius: 8px; margin-bottom: 1.5rem;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-bottom: 1.2rem;">
                    <div>
                        <label style="display:block; font-size:0.8rem; color:#ffffff; margin-bottom:0.4rem; font-weight:bold;">DARI TANGGAL</label>
                        <input type="date" id="filterStartDate" onchange="applyFiltersAndRender()" onclick="this.showPicker()" style="width:100%; padding:0.6rem; background:var(--bg-main); border:1px solid var(--border); color:#ffffff; border-radius:6px;">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.8rem; color:#ffffff; margin-bottom:0.4rem; font-weight:bold;">HINGGA TANGGAL</label>
                        <input type="date" id="filterEndDate" onchange="applyFiltersAndRender()" onclick="this.showPicker()" style="width:100%; padding:0.6rem; background:var(--bg-main); border:1px solid var(--border); color:#ffffff; border-radius:6px;">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; border-top: 1px solid var(--border); padding-top: 1rem;">
                    <div>
                        <div style="font-size:0.8rem; color:var(--text-muted); font-weight:bold;">TOTAL PENJUALAN (OMSET)</div>
                        <div id="summaryTotalSold" style="font-size:1.4rem; font-weight:900; color:#ffffff; margin-top:0.3rem;">Rp 0</div>
                    </div>
                    <div>
                        <div style="font-size:0.8rem; color:var(--text-muted); font-weight:bold;">KEUNTUNGAN BERSIH (NET P/L)</div>
                        <div id="summaryTotalProfit" style="font-size:1.4rem; font-weight:900; color:var(--green); margin-top:0.3rem;">Rp 0</div>
                    </div>
                </div>
            </div>
            
            <div class="inventory-grid" id="vaultGrid"></div>
            <div id="soldGrid" class="hidden"></div>
        </div>
    </div>
</div>

<script>
    let API_URL = 'http://localhost:3000';
    if (window.location.hostname && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1' && window.location.protocol !== 'file:') {
        API_URL = window.location.protocol + '//' + window.location.hostname + ':3000';
    }

    let globalData = []; let editStateId = null; let isBulkMode = false;
    let vaultDisplayLimit = 20; let selectedBulkIds = new Set(); let bulkQtyMap = {}; 
    
    function formatRupiah(input) { let value = input.value.replace(/\D/g, ''); if(value !== '') { input.value = new Intl.NumberFormat('id-ID').format(value); } else { input.value = ''; } }
    function parseRupiah(value) { if(!value) return 0; return parseFloat(value.toString().replace(/\./g, '')); }
    const formatIDR = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num);

    function showToast(msg, isError = false) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--green)';
        toast.innerText = msg; container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 4000); }, 3500);
    }

    function openModal(title, bodyText, inputsHtml, confirmCallback) {
        document.getElementById('modalTitle').innerText = title; document.getElementById('modalBody').innerHTML = bodyText; document.getElementById('modalInputs').innerHTML = inputsHtml;
        const confirmBtn = document.getElementById('modalConfirmBtn'); const newBtn = confirmBtn.cloneNode(true); confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);
        newBtn.onclick = async () => { 
            const originalText = newBtn.innerText; newBtn.innerText = 'Memproses...'; newBtn.style.opacity = '0.5'; newBtn.style.pointerEvents = 'none';
            try { await confirmCallback(); } catch(e) { console.error("System Error:", e); showToast("Kesalahan Database: " + e.message, true); } 
            finally { newBtn.innerText = originalText; newBtn.style.opacity = '1'; newBtn.style.pointerEvents = 'auto'; }
        };
        document.getElementById('customModal').classList.remove('hidden');
    }
    
    function closeModal() { document.getElementById('customModal').classList.add('hidden'); }

    function handleCategoryChange() {
        const cat = document.getElementById('categorySelect').value;
        document.getElementById('conditionGroup').classList.toggle('hidden', cat === 'Sealed');
        document.getElementById('specialAttributes').classList.toggle('hidden', cat === 'Sealed');
        
        const isGraded = cat === 'Slab' || cat === 'Slab Set';
        document.getElementById('gradedFields').classList.toggle('hidden', !isGraded);
        
        if (cat === 'Slab Set') {
            document.getElementById('certInput').placeholder = "Misal: 88801 - 88809";
            document.getElementById('nama').placeholder = "Misal: Eeveelution Yu Nagaba (9 Cards)";
            document.getElementById('gradeInput').placeholder = "Misal: PSA 10";
        } else {
            document.getElementById('certInput').placeholder = "";
            document.getElementById('nama').placeholder = "";
            document.getElementById('gradeInput').placeholder = "";
        }
    }

    function switchTab(tab) {
        if(isBulkMode) toggleBulkMode(); 
        document.getElementById('inventorySearchInput').value = ''; document.getElementById('filterStartDate').value = ''; 
        document.getElementById('filterEndDate').value = ''; document.getElementById('filterSetSelect').value = ''; 
        document.getElementById('tabVault').classList.toggle('active', tab === 'vault'); document.getElementById('tabSold').classList.toggle('active', tab === 'sold');
        document.getElementById('vaultGrid').classList.toggle('hidden', tab !== 'vault'); document.getElementById('soldGrid').classList.toggle('hidden', tab !== 'sold');
        document.getElementById('btnToggleBulk').classList.toggle('hidden', tab !== 'vault'); document.getElementById('soldFilterSection').classList.toggle('hidden', tab !== 'sold');
        vaultDisplayLimit = 20; applyFiltersAndRender();
    }

    function handleBulkQtyChange(id, val) { bulkQtyMap[id] = parseInt(val) || 1; }

    async function quickAdjustQty(id, action) {
        if(isBulkMode) return; 
        try {
            const res = await fetch(`${API_URL}/api/inventory/${id}/qty`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action }) });
            if(res.ok) loadInventory(); else { const err = await res.json().catch(()=>({})); throw new Error(err.error || "Gagal mengubah qty"); }
        } catch (e) { showToast(e.message, true); }
    }

    function toggleCardBulk(id) {
        if (!isBulkMode) return; 
        const card = document.getElementById(`card_${id}`); const uiOverlay = document.getElementById(`bulk_ui_${id}`);
        if (selectedBulkIds.has(id)) {
            selectedBulkIds.delete(id); card.classList.remove('selected-for-bulk'); uiOverlay.classList.add('hidden');
        } else {
            selectedBulkIds.add(id); card.classList.add('selected-for-bulk'); uiOverlay.classList.remove('hidden');
            if (!bulkQtyMap[id]) { const item = globalData.find(x => x.id === id); if (item) bulkQtyMap[id] = item.quantity; }
        }
        updateBulkCount();
    }

    function toggleSelectAll() {
        if (!isBulkMode) return;
        const visibleCards = Array.from(document.querySelectorAll('#vaultGrid .showcase-card'));
        if (visibleCards.length === 0) return showToast("Tidak ada kartu untuk diseleksi!", true);
        const isAllVisibleSelected = visibleCards.every(card => selectedBulkIds.has(card.id.replace('card_', '')));
        
        visibleCards.forEach(card => {
            const id = card.id.replace('card_', ''); const uiOverlay = document.getElementById(`bulk_ui_${id}`);
            if (isAllVisibleSelected) {
                selectedBulkIds.delete(id); card.classList.remove('selected-for-bulk'); uiOverlay.classList.add('hidden');
            } else {
                selectedBulkIds.add(id); card.classList.add('selected-for-bulk'); uiOverlay.classList.remove('hidden');
                if (!bulkQtyMap[id]) { const item = globalData.find(x => x.id === id); if (item) bulkQtyMap[id] = item.quantity; }
            }
        });
        updateBulkCount();
    }

    function showMoreVault() { vaultDisplayLimit += 20; applyFiltersAndRender(); }
    
    function showAllVault() { vaultDisplayLimit = globalData.length; applyFiltersAndRender(); }

    function applyFiltersAndRender() {
        const query = document.getElementById('inventorySearchInput').value.toLowerCase();
        const startDate = document.getElementById('filterStartDate').value; const endDate = document.getElementById('filterEndDate').value; 
        const selectedSet = document.getElementById('filterSetSelect').value.toLowerCase(); 
        const isSearchingVault = query !== '' || selectedSet !== '';
        
        const vaultGrid = document.getElementById('vaultGrid'); const soldGrid = document.getElementById('soldGrid');
        let vaultHtml = ''; let soldHtml = ''; let runningTotalSold = 0; let runningTotalProfit = 0;

        const vaultItems = globalData.filter(item => item.status === 'Vault' || !item.status);
        const filteredVault = vaultItems.filter(item => {
            const txt = (item.name + ' ' + item.set_name).toLowerCase();
            return txt.includes(query) && (!selectedSet || item.set_name.toLowerCase() === selectedSet);
        });
        
        // --- LOGIKA SORTING HARGA MARKET ---
        const sortVal = document.getElementById('sortSelect') ? document.getElementById('sortSelect').value : 'terbaru';
        if (sortVal === 'market_tertinggi') {
            filteredVault.sort((a, b) => parseFloat(b.market_price || 0) - parseFloat(a.market_price || 0));
        } else if (sortVal === 'market_terendah') {
            filteredVault.sort((a, b) => parseFloat(a.market_price || 0) - parseFloat(b.market_price || 0));
        }
        // -----------------------------------
        
        const itemsToRender = isSearchingVault ? filteredVault : filteredVault.slice(0, vaultDisplayLimit);

        itemsToRender.forEach(item => {
            // PERBAIKAN URL GAMBAR (MENANGANI FILE LOKAL)
            let imgSrc = item.image_url || 'https://via.placeholder.com/55x77/111827/ffffff?text=No+Img';
            if (imgSrc.startsWith('/uploads/')) {
                imgSrc = API_URL + imgSrc;
            }

            let badges = '';
            if(item.category === 'Slab Set') { badges += `<span class="tag" style="background: #be185d; color: #fbcfe8;">Sequential Set</span>`; } 
            else { badges += `<span class="tag">${item.category}</span>`; }
            
            badges += `<span class="tag">${item.language}</span>`;
            if(item.is_first_edition) badges += `<span class="tag" style="color:#fbbf24">1st Ed</span>`;
            if(item.is_holo) badges += `<span class="tag">Holo</span>`;
            if(item.grader) badges += `<span class="tag" style="background: rgba(139, 92, 246, 0.2); color: #c4b5fd;">${item.grader} ${item.grade || ''}</span>`;

            const qtyAdjuster = `<div class="qty-adjuster"><button class="qty-btn" onclick="event.stopPropagation(); quickAdjustQty('${item.id}', 'minus')">-</button><span class="qty-val">${item.quantity}</span><button class="qty-btn" onclick="event.stopPropagation(); quickAdjustQty('${item.id}', 'add')">+</button></div>`;
            const safeName = item.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            
            const isSelected = selectedBulkIds.has(item.id); const selectedClass = isSelected ? 'selected-for-bulk' : '';
            const overlayHidden = isSelected ? '' : 'hidden'; const currentBulkQty = bulkQtyMap[item.id] || item.quantity;

            vaultHtml += `
                <div class="showcase-card ${isBulkMode ? 'is-bulkable' : ''} ${selectedClass}" id="card_${item.id}" onclick="toggleCardBulk('${item.id}')">
                    <div id="bulk_ui_${item.id}" class="bulk-overlay-ui ${overlayHidden}">
                        <div class="check-circle">✓</div>
                        <div style="display:flex; flex-direction:column; align-items:center;" onclick="event.stopPropagation()">
                            <span style="font-size:0.75rem; color:#ffffff; font-weight:bold; background:var(--bg-card); padding:4px 10px; border-radius:4px; margin-bottom:6px; border:1px solid var(--border);">Qty Diproses:</span>
                            <input type="number" id="bulk_qty_${item.id}" value="${currentBulkQty}" min="1" max="${item.quantity}" class="bulk-qty-override" oninput="handleBulkQtyChange('${item.id}', this.value)">
                        </div>
                    </div>
                    <div class="card-header">
                        <img src="${imgSrc}" class="card-thumb" alt="Card" loading="lazy">
                        <div class="card-title-area">
                            <h3 class="card-title" title="${item.name}"><span class="card-name-text">${item.name}</span>${qtyAdjuster}</h3>
                            <p class="card-set">${item.set_name}</p>
                            <div class="finance-row">
                                <div><span style="color:var(--text-muted)">Cost:</span> <span style="color:#ffffff;">${parseFloat(item.purchase_price) > 0 ? formatIDR(item.purchase_price) : '-'}</span></div>
                                <div><span style="color:var(--text-muted)">Market:</span> <span style="color:var(--green);">${parseFloat(item.market_price) > 0 ? formatIDR(item.market_price) : '-'}</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="meta-tags">${badges}</div>
                        <div class="card-actions">
                            <button type="button" class="btn-action" style="background:var(--sold);" onclick="event.stopPropagation(); openSingleSellModal('${item.id}', '${safeName}', ${item.quantity})">Jual</button>
                            <button type="button" class="btn-action" style="background:#2563eb;" onclick="event.stopPropagation(); mulaiEdit('${item.id}')">Edit</button>
                            <button type="button" class="btn-action" style="background:var(--danger);" onclick="event.stopPropagation(); hapusItem('${item.id}')">Del</button>
                        </div>
                    </div>
                </div>
            `;
        });

        if (!isSearchingVault && filteredVault.length > vaultDisplayLimit) {
            vaultHtml += `
            <div style="grid-column: 1 / -1; display: flex; justify-content: center; gap: 1rem; padding: 1.5rem 0;">
                <button onclick="showMoreVault()" class="btn-show-more">Tampilkan Lebih Banyak (${vaultDisplayLimit} / ${filteredVault.length}) ↓</button>
                <button onclick="showAllVault()" class="btn-show-all">Tampilkan Semua 🚀</button>
            </div>`;
        }
        if (filteredVault.length === 0) vaultHtml = `<div style="grid-column: 1/-1; text-align:center; padding: 3rem; color: var(--text-muted); font-size:1rem; font-weight:bold;">Tidak ada kartu yang ditemukan.</div>`;
        vaultGrid.innerHTML = vaultHtml;

        const soldItems = globalData.filter(item => item.status === 'Sold');
        const groupedSold = {};
        soldItems.forEach(item => {
            const tid = item.transaction_id || item.id;
            if(!groupedSold[tid]) groupedSold[tid] = { items: [], total_sold: 0, total_modal: 0, sold_at: item.sold_at };
            groupedSold[tid].items.push(item);
            groupedSold[tid].total_sold += parseFloat(item.sold_price || 0) * item.quantity;
            groupedSold[tid].total_modal += parseFloat(item.purchase_price || 0) * item.quantity;
        });

        let soldRenderCount = 0;
        for(let tid in groupedSold) {
            const trx = groupedSold[tid]; const cardDate = trx.sold_at ? trx.sold_at.substring(0, 10) : '';
            let dateMatches = true;
            if (startDate && cardDate < startDate) dateMatches = false;
            if (endDate && cardDate > endDate) dateMatches = false;

            let contentMatches = false; let miniCardsHtml = '';
            trx.items.forEach(i => {
                const itemSet = (i.set_name || '').toLowerCase();
                const matchQuery = (i.name + ' ' + (i.set_name||'')).toLowerCase().includes(query);
                const matchSet = !selectedSet || itemSet === selectedSet;
                const finalItemShow = matchQuery && matchSet;
                if(finalItemShow) contentMatches = true;

                let iImgSrc = i.image_url || 'https://via.placeholder.com/40x56/111827/ffffff?text=No+Img';
                if (iImgSrc.startsWith('/uploads/')) iImgSrc = API_URL + iImgSrc;

                miniCardsHtml += `
                    <div class="trx-mini-item ${finalItemShow ? '' : 'hidden'}">
                        <img src="${iImgSrc}" style="width:40px; height:56px; object-fit:cover; border-radius:4px; border:1px solid var(--border);" loading="lazy">
                        <div style="flex:1; font-size:0.85rem; color:#ffffff;">
                            <b style="font-size:0.95rem;">${i.name}</b> <span style="color:var(--text-muted); font-weight:bold;">x${i.quantity}</span>
                            <div style="font-size:0.75rem; color:var(--text-muted); margin-top:2px;">
                                Total Modal: <span style="color:#ffffff;">${formatIDR(i.purchase_price * i.quantity)}</span>
                            </div>
                        </div>
                        <button onclick="batalJual('${i.id}')" class="btn-undo-sale">↩ Cancel</button>
                    </div>
                `;
            });

            if (dateMatches && (contentMatches || (query === '' && !selectedSet))) {
                soldRenderCount++; const profit = trx.total_sold - trx.total_modal; const profitClass = profit >= 0 ? 'profit-plus' : 'profit-minus';
                let tglDisplay = '-';
                if(trx.sold_at) {
                    const d = new Date(trx.sold_at);
                    tglDisplay = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }) + ' ' + d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                }
                soldHtml += `
                    <div class="trx-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.8rem; font-size:0.85rem;">
                            <div><div style="color:var(--text-muted); font-size:0.75rem; font-weight:bold; margin-bottom:2px;">STRUK ${tid.substring(0,8).toUpperCase()} • ${tglDisplay}</div><div style="color:#ffffff;">Gross: <b style="font-size:1.1rem;">${formatIDR(trx.total_sold)}</b></div></div>
                            <div style="text-align:right;"><div style="color:var(--text-muted); font-size:0.75rem; font-weight:bold; margin-bottom:2px;">P/L</div><div class="${profitClass}" style="font-weight:900; font-size:1.1rem;">${profit >= 0 ? '+' : ''}${formatIDR(profit)}</div></div>
                        </div>
                        <div>${miniCardsHtml}</div>
                    </div>
                `;
                runningTotalSold += trx.total_sold; runningTotalProfit += profit;
            }
        }

        if(soldRenderCount === 0) soldHtml = `<div style="text-align:center; padding: 3rem; color: var(--text-muted); font-size:1rem; font-weight:bold;">Belum ada penjualan.</div>`;
        soldGrid.innerHTML = soldHtml;

        document.getElementById('summaryTotalSold').innerText = formatIDR(runningTotalSold);
        const profitEl = document.getElementById('summaryTotalProfit');
        profitEl.innerText = (runningTotalProfit >= 0 ? '+' : '') + formatIDR(runningTotalProfit);
        profitEl.className = runningTotalProfit >= 0 ? 'profit-plus' : 'profit-minus';
    }

    async function loadInventory() {
        try {
            const res = await fetch(`${API_URL}/api/inventory`); globalData = await res.json();
            const setSelect = document.getElementById('filterSetSelect'); const previousSelection = setSelect.value;
            const uniqueSets = [...new Set(globalData.map(item => item.set_name).filter(Boolean))].sort();
            setSelect.innerHTML = '<option value="">✨ Semua Set Expansion</option>';
            uniqueSets.forEach(setName => {
                const opt = document.createElement('option'); opt.value = setName; opt.innerText = setName;
                if(setName === previousSelection) opt.selected = true; setSelect.appendChild(opt);
            });
            applyFiltersAndRender();
        } catch (error) { console.error("Load Inventory Error:", error); }
    }

    function openSingleSellModal(id, namaItem, maxQty) {
        if(isBulkMode) return; 
        let inputsHtml = '';
        if(maxQty > 1) {
            inputsHtml += `<label style="font-size:0.85rem; display:block; margin-bottom:0.4rem; font-weight:bold; color:#ffffff;">Jumlah Terjual (Maks: ${maxQty})</label>
                <div class="qty-adjuster" style="margin-bottom: 1rem; display:flex; justify-content: space-between; padding: 0.4rem 0.6rem; background: var(--bg-main);">
                    <button type="button" class="qty-btn" style="font-size:1.4rem;" onclick="let el=document.getElementById('modalSellQtyVal'); let v=parseInt(el.value)||0; if(v > 1) el.value = v - 1;">-</button>
                    <input type="number" id="modalSellQtyVal" value="${maxQty}" min="1" max="${maxQty}" style="width: 70px; text-align: center; border: none; background: transparent; color: white; font-size: 1.2rem; font-weight: bold; padding: 0;">
                    <button type="button" class="qty-btn" style="font-size:1.4rem;" onclick="let el=document.getElementById('modalSellQtyVal'); let v=parseInt(el.value)||0; if(v < ${maxQty}) el.value = v + 1;">+</button>
                </div>`;
        } else { inputsHtml += `<input type="hidden" id="modalSellQtyVal" value="1">`; }
        inputsHtml += `<label style="font-size:0.85rem; font-weight:bold; color:#ffffff;">Total Harga Jual Keseluruhan (Rp)</label><input type="text" id="modalSellPrice" placeholder="Misal: 150.000" style="margin-top:0.3rem; font-size:1.1rem; font-weight:bold;" oninput="formatRupiah(this)">`;

        openModal(`Jual ${namaItem}`, `Silakan atur kuantitas dan harga jual untuk mencatat transaksi.`, inputsHtml, async () => {
            const sellQtyElement = document.getElementById('modalSellQtyVal'); const hargaElement = document.getElementById('modalSellPrice');
            const sellQty = parseInt(sellQtyElement.value); const harga = parseRupiah(hargaElement.value);
            if(isNaN(sellQty) || sellQty < 1 || sellQty > maxQty) { showToast(`Kuantitas harus 1 - ${maxQty}!`, true); return; }
            if(isNaN(harga) || harga === 0) { showToast('Harga belum diisi!', true); return; }
            
            const res = await fetch(`${API_URL}/api/inventory/${id}/sell`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sell_qty: sellQty, sold_price: harga }) });
            if(res.ok) { closeModal(); showToast("Berhasil dijual!"); loadInventory(); switchTab('sold'); } 
            else { const err = await res.json().catch(()=>({})); throw new Error(err.error || "Gagal terkoneksi ke Server MySQL."); }
        });
    }

    function openBulkSellModal() {
        const selectedCards = document.querySelectorAll('.selected-for-bulk'); 
        if(selectedCards.length === 0) return showToast('Pilih minimal 1 item dengan mengeklik kartunya!', true);
        const inputsHtml = `<label style="font-size:0.85rem; font-weight:bold; color:#ffffff;">Total Harga Borongan Keseluruhan (Rp)</label><input type="text" id="modalBulkPrice" placeholder="Misal: 250.000" style="margin-top:0.3rem; font-size:1.1rem; font-weight:bold;" oninput="formatRupiah(this)">`;
        
        openModal(`Jual Borongan (${selectedCards.length} Tipe)`, `Sistem akan mencatat total omset keseluruhan di struk dan membagi proporsional nilainya ke tiap kartu.`, inputsHtml, async () => {
            const harga = parseRupiah(document.getElementById('modalBulkPrice').value); 
            if(isNaN(harga) || harga === 0) { showToast('Harga kosong!', true); return; }
            
            const items = Array.from(selectedCards).map(card => { const id = card.id.replace('card_', ''); return { id: id, sell_qty: document.getElementById(`bulk_qty_${id}`).value }; });
            const res = await fetch(`${API_URL}/api/inventory/bulk-sell`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ items, total_price: harga }) });
            if(res.ok) { closeModal(); showToast("Borongan sukses!"); loadInventory(); switchTab('sold'); } 
            else { const err = await res.json().catch(()=>({})); throw new Error(err.error || "Gagal terkoneksi ke Server MySQL."); }
        });
    }

    function openBulkDeleteModal() {
        const selectedCards = document.querySelectorAll('.selected-for-bulk'); 
        if(selectedCards.length === 0) return showToast('Pilih minimal 1 item dengan mengeklik kartunya!', true);
        
        openModal(`Hapus Borongan (${selectedCards.length} Tipe)`, `Apakah kamu yakin ingin menghapus permanen semua kartu yang dipilih dari Vault? <br><br><b style="color:var(--danger)">Aksi ini tidak bisa dikembalikan.</b>`, '', async () => {
            const ids = Array.from(selectedCards).map(card => card.id.replace('card_', ''));
            const res = await fetch(`${API_URL}/api/inventory/bulk-delete`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ids }) });
            if(res.ok) { closeModal(); showToast(`${selectedCards.length} item berhasil terhapus!`); loadInventory(); toggleBulkMode(); } 
            else { const err = await res.json().catch(()=>({})); throw new Error(err.error || "Gagal terkoneksi ke Server MySQL."); }
        });
    }

    function batalJual(id) {
        openModal('Batalkan Penjualan', 'Tarik kartu ini kembali ke Vault dan gabungkan kuantitasnya ke tumpukan semula?', '', async () => {
            const res = await fetch(`${API_URL}/api/inventory/${id}/undo-sell`, { method: 'PUT' }); 
            if(res.ok) { closeModal(); showToast("Berhasil kembali ke Vault."); loadInventory(); } 
            else { const err = await res.json().catch(()=>({})); throw new Error(err.error || "Gagal terkoneksi ke Server MySQL."); }
        });
    }

    function hapusItem(id) {
        if(isBulkMode) return;
        openModal('Hapus Permanen', 'Yakin ingin menghapus kartu ini dari database?', '', async () => {
            const res = await fetch(`${API_URL}/api/inventory/${id}`, { method: 'DELETE' }); 
            if(res.ok) { closeModal(); showToast("Item terhapus permanen."); loadInventory(); } 
            else { const err = await res.json().catch(()=>({})); throw new Error(err.error || "Gagal terkoneksi ke Server MySQL."); }
        });
    }

    function toggleBulkMode() {
        isBulkMode = !isBulkMode; document.getElementById('bulkActionBar').classList.toggle('hidden', !isBulkMode);
        const btn = document.getElementById('btnToggleBulk'); btn.innerText = isBulkMode ? 'Tutup Mode' : '📦 Mode Borongan'; btn.style.background = isBulkMode ? 'var(--danger)' : '#1f2937';
        
        document.querySelectorAll('.showcase-card').forEach(card => {
            card.classList.toggle('is-bulkable', isBulkMode);
            if (!isBulkMode) { card.classList.remove('selected-for-bulk'); const ui = document.getElementById(`bulk_ui_${card.id.replace('card_', '')}`); if(ui) ui.classList.add('hidden'); }
        });
        if (!isBulkMode) { selectedBulkIds.clear(); bulkQtyMap = {}; }
        updateBulkCount();
    }
    function updateBulkCount() { document.getElementById('bulkCountText').innerText = `${selectedBulkIds.size} Tipe Dipilih`; }

    function exportToExcel() {
        const vaultItems = globalData.filter(item => item.status === 'Vault' || !item.status);
        if (vaultItems.length === 0) return showToast('Tidak ada kartu di Vault untuk diexport!', true);
        showToast("Menyiapkan file Excel...", false);
        const exportData = vaultItems.map(item => ({
            name: item.name, category: item.category, set_name: item.set_name, set_code: item.set_code || '', card_number: item.card_number || '', language: item.language,
            quantity: item.quantity, purchase_price: item.purchase_price, market_price: item.market_price, card_condition: item.card_condition,
            is_holo: item.is_holo === 1 ? 'YES' : 'NO', is_first_edition: item.is_first_edition === 1 ? 'YES' : 'NO', grader: item.grader || '', grade: item.grade || '',
            cert_number: item.cert_number || '', notes: item.notes || '', image_url: item.image_url || ''
        }));
        try {
            const worksheet = XLSX.utils.json_to_sheet(exportData); const workbook = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(workbook, worksheet, "Holovault");
            const dateStr = new Date().toISOString().slice(0, 10); XLSX.writeFile(workbook, `Holovault_Backup_${dateStr}.xlsx`); showToast('✅ Berhasil mengunduh Excel!');
        } catch (error) { console.error("Export Error:", error); showToast('Gagal membuat file Excel.', true); }
    }

    function handleExcelImport(event) {
        const file = event.target.files[0]; if (!file) return; const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                showToast("Menganalisis file Excel...", false);
                const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data, { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                if (jsonData.length === 0) return showToast('File kosong!', true);

                jsonData.forEach(item => {
                    Object.keys(item).forEach(key => { if (item[key] === "NULL" || item[key] === "null") item[key] = null; });
                    if(item.img_url) item.image_url = item.img_url; 
                    if(String(item.is_holo).trim().toUpperCase() === 'YES' || item.is_holo == 1) item.is_holo = 1; else item.is_holo = 0;
                    if(String(item.is_first_edition).trim().toUpperCase() === 'YES' || item.is_first_edition == 1) item.is_first_edition = 1; else item.is_first_edition = 0;
                    let q = parseInt(item.quantity); item.quantity = (isNaN(q) || q < 1) ? 1 : q;
                });

                const res = await fetch(`${API_URL}/api/inventory/bulk-import`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(jsonData) });
                if (res.ok) { const successData = await res.json(); showToast(successData.message); loadInventory(); } 
                else { const errData = await res.json(); showToast('Gagal API: ' + (errData.error || 'Server menolak data.'), true); }
            } catch (err) { 
                console.error(err);
                if (err.message === "Failed to fetch") { showToast('Error: Server Node.js terputus / mati.', true); } else { showToast('Error sistem: ' + err.message, true); }
            }
            document.getElementById('excelFileInput').value = '';
        }; reader.readAsArrayBuffer(file);
    }

    async function cariKartu() {
        const qN = document.getElementById('searchInput').value; const qS = document.getElementById('searchSet').value;
        const btn = document.getElementById('btnSearch'); const hasilDiv = document.getElementById('hasilPencarian');
        if (!qN.trim() && !qS.trim()) return showToast("Isi parameter cari!", true);
        btn.innerText = '...'; hasilDiv.innerHTML = '<i style="color:#ffffff;">Searching...</i>';
        try {
            const res = await fetch(`${API_URL}/api/search-card?name=${encodeURIComponent(qN)}&set=${encodeURIComponent(qS)}`);
            const cards = await res.json(); hasilDiv.innerHTML = '';
            if (cards.length === 0) return hasilDiv.innerHTML = '<p style="color:var(--danger); font-size:0.9rem; font-weight:bold;">Card Not Found.</p>';
            
            cards.forEach(card => {
                const img = document.createElement('img'); img.src = card.images.small; img.className = 'card-preview';
                img.onclick = () => {
                    document.querySelectorAll('.card-preview').forEach(el => el.classList.remove('selected')); img.classList.add('selected');
                    document.getElementById('nama').value = card.name; document.getElementById('set').value = card.set.name;
                    document.getElementById('imageUrl').value = card.images.small; document.getElementById('cardNumber').value = card.number || '';
                    const customSetMapping = { 'sv2': 'PAL', 'sv3': 'OBF', 'sv3pt5': 'MEW', 'sv4pt5': 'PAF', 'swsh12pt5': 'CRZ', 'swsh4pt5': 'SHF', 'swsh7pt5': 'CEL', 'pgo': 'PGO' };
                    document.getElementById('setCode').value = (customSetMapping[card.set.id] || card.set.ptcgoCode || card.set.id || '').toUpperCase();
                }; hasilDiv.appendChild(img);
            });
        } catch (error) { hasilDiv.innerHTML = '<p style="color:var(--danger); font-size:0.9rem; font-weight:bold;">Offline. Server down?</p>'; } finally { btn.innerText = 'Cari'; }
    }

    function mulaiEdit(id) {
        if(isBulkMode) return;
        const item = globalData.find(x => x.id === id); if(!item) return;
        editStateId = id; document.getElementById('formTitle').innerText = 'Edit Entry';
        
        // Membersihkan input file lokal saat masuk mode Edit
        document.getElementById('imageFile').value = '';

        ['nama', 'set', 'setCode', 'cardNumber', 'qtyInput', 'notesInput', 'gradeInput', 'certInput', 'imageUrl'].forEach(key => {
            const mapKey = { 'nama':'name', 'set':'set_name', 'setCode':'set_code', 'cardNumber':'card_number', 'qtyInput':'quantity', 'notesInput':'notes', 'gradeInput':'grade', 'certInput':'cert_number', 'imageUrl':'image_url' }[key];
            document.getElementById(key).value = item[mapKey] || '';
        });
        
        document.getElementById('purchasePrice').value = item.purchase_price > 0 ? new Intl.NumberFormat('id-ID').format(item.purchase_price) : '';
        document.getElementById('marketPrice').value = item.market_price > 0 ? new Intl.NumberFormat('id-ID').format(item.market_price) : '';

        ['categorySelect', 'languageSelect', 'conditionSelect', 'graderSelect'].forEach(key => {
            const mapKey = { 'categorySelect':'category', 'languageSelect':'language', 'conditionSelect':'card_condition', 'graderSelect':'grader' }[key];
            document.getElementById(key).value = item[mapKey] || '';
        });
        document.getElementById('isHolo').checked = item.is_holo === 1; document.getElementById('isFirstEd').checked = item.is_first_edition === 1;
        handleCategoryChange(); document.getElementById('btnSubmit').innerText = 'UPDATE ENTRY'; document.getElementById('btnCancel').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function batalEdit() {
        editStateId = null; document.getElementById('formKartu').reset(); document.getElementById('formTitle').innerText = 'Vault Entry';
        document.getElementById('btnSubmit').innerText = 'SIMPAN KE VAULT'; document.getElementById('btnCancel').classList.add('hidden'); handleCategoryChange();
    }

    document.getElementById('formKartu').addEventListener('submit', async (e) => {
        e.preventDefault(); const formData = new FormData(e.target);
        
        // PERBAIKAN TYPO DI SINI:
        formData.set('purchase_price', parseRupiah(document.getElementById('purchasePrice').value));
        formData.set('market_price', parseRupiah(document.getElementById('marketPrice').value)); 

        const url = editStateId ? `${API_URL}/api/inventory/${editStateId}` : `${API_URL}/api/inventory`;
        try {
            const res = await fetch(url, { method: editStateId ? 'PUT' : 'POST', body: formData });
            if(res.ok) { batalEdit(); loadInventory(); showToast(editStateId ? "Teredit!" : "Tersimpan!"); } else { throw new Error("Gagal menyimpan ke database."); }
        } catch (error) { showToast('Error DB: ' + error.message, true); }
    });

    handleCategoryChange(); loadInventory();
</script>
</body>
</html>
